<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRDj9jqRbu3O_s8vYnC4cE62VDO7LPPaV8oQj1I_pPNxZdH2ijDnIPY9sxSkaerSOlW50UgU5l-WeR/pub?gid=0&single=true&output=csv";

fetch(SHEET_URL)
.then(res => res.text())
.then(csv => {

    // 🔧 Convert CSV → array
    const rows = csv.trim().split("\n").map(r => r.split(","));

    // 🔧 Remove header row
    const headers = rows[0];
    const data = rows.slice(1).map(row => {
        let obj = {};
        headers.forEach((h, i) => obj[h.trim()] = row[i]);
        return obj;
    });

    // 🔧 Use correct column names from GAS
    const temps = data.map(d => parseFloat(d["temp"])).slice(-20);
    const winds = data.map(d => parseFloat(d["wind_speed"])).slice(-20);
    const labels = data.map(d => d["timestamp"]).slice(-20);

    new Chart(document.getElementById("tempChart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{ label: 'Temp (°C)', data: temps }]
        }
    });

    new Chart(document.getElementById("windChart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{ label: 'Wind Speed (kt)', data: winds }]
        }
    });

});

// Camera placeholders
document.getElementById("cam1").src = "cam1.jpg";
document.getElementById("cam2").src = "cam2.jpg";
document.getElementById("cam3").src = "cam3.jpg";
document.getElementById("cam4").src = "cam4.jpg";

</script>
