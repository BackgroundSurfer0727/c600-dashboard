<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SBMA AWOS Live Weather Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
    header { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    h1 { margin: 0; }
    #status { font-size: 0.9rem; color: #ddd; }

    .main-container { max-width: 1400px; margin: auto; }
    .data-grid-30 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .data-box { background: #fff; border: 1px solid #eee; border-radius: 5px; padding: 10px; }
    .data-label { font-size: 0.8rem; color: #777; font-weight: bold; }
    .data-value { font-size: 1.2rem; color: #2c3e50; font-weight: bold; }

    .images-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
    .img-container { height: 200px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 5px; overflow: hidden; position: relative; }
    .img-container img { width: 100%; height: 100%; object-fit: cover; }
    .img-label { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); color: white; padding: 2px 5px; font-size: 0.7rem; border-radius: 3px; }

    .charts-container { margin-top: 30px; }
    .chart-box { background: #fff; border: 1px solid #eee; border-radius: 5px; padding: 15px; margin-bottom: 20px; }
    .chart-box canvas { width: 100%; height: 300px; }
  </style>
</head>
<body>
  <header>
    <h1>SBMA AWOS Live Weather (C600 Bridge)</h1>
    <div id="status">Status: Connecting...</div>
  </header>

  <div class="main-container">
    <h2>Latest Data</h2>
    <div id="data-grid" class="data-grid-30"></div>

    <h2>Camera Images</h2>
    <div class="images-grid">
      <div class="img-container"><img id="img-cam1"><div class="img-label">Cam 1</div></div>
      <div class="img-container"><img id="img-cam2"><div class="img-label">Cam 2</div></div>
      <div class="img-container"><img id="img-cam3"><div class="img-label">Cam 3</div></div>
      <div class="img-container"><img id="img-cam4"><div class="img-label">Cam 4</div></div>
    </div>

    <div id="timestamp" style="margin-top:10px;">Data as of: --</div>

    <h2>Charts</h2>
    <div id="charts-container" class="charts-container"></div>
  </div>

  <script>
    const sheetId = "1ZjECyZKnnqzhWvJjHq6WHpgNho2mb9Eml0gInIM5bTk";
    const feedUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    function processImageUrl(url) {
      if (!url) return '';
      if (url.includes("id=")) {
        const fileId = url.split("id=")[1];
        return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
      }
      return url;
    }

    async function fetchWeatherData() {
      const statusEl = document.getElementById('status');
      statusEl.innerText = "Status: Fetching latest data...";
      try {
        const response = await fetch(feedUrl);
        const text = await response.text();
        const jsonString = text.substring(text.indexOf("(") + 1, text.lastIndexOf(")"));
        const json = JSON.parse(jsonString);
        const rows = json.table.rows;
        const headers = json.table.cols.map(c => c.label);

        if (!rows || rows.length === 0) {
          statusEl.innerText = "Status: No data found.";
          return;
        }

        const latestRow = rows[rows.length - 1].c;

        // --- Show all data values except timestamp and images ---
        const grid = document.getElementById('data-grid');
        grid.innerHTML = '';
        headers.forEach((h, i) => {
          if (!h) return;
          if (h.includes("Timestamp") || h.startsWith("Image")) return;
          const val = latestRow[i] ? latestRow[i].v : '--';
          const box = document.createElement('div');
          box.className = 'data-box';
          box.innerHTML = `<div class="data-label">${h}</div><div class="data-value">${val}</div>`;
          grid.appendChild(box);
        });

        // --- Show 4 images ---
        document.getElementById('img-cam1').src = processImageUrl(latestRow[headers.indexOf("Image_Cam1")]?.v || '');
        document.getElementById('img-cam2').src = processImageUrl(latestRow[headers.indexOf("Image_Cam2")]?.v || '');
        document.getElementById('img-cam3').src = processImageUrl(latestRow[headers.indexOf("Image_Cam3")]?.v || '');
        document.getElementById('img-cam4').src = processImageUrl(latestRow[headers.indexOf("Image_Cam4")]?.v || '');

        const ts = latestRow[headers.indexOf("Timestamp (UTC)")]?.v || '--';
        document.getElementById('timestamp').innerText = "Data as of: " + ts;

        // --- Build grouped charts ---
        const chartsContainer = document.getElementById('charts-container');
        chartsContainer.innerHTML = '';

        function buildChart(title, fields, dualAxis=false) {
          const labels = rows.slice(-288).map(r => r.c[headers.indexOf("Timestamp (UTC)")]?.v || '');
          const datasets = [];
          fields.forEach((f, idx) => {
            const colIndex = headers.indexOf(f);
            if (colIndex === -1) return;
            const values = rows.slice(-288).map(r => r.c[colIndex]?.v || null);
            datasets.push({
              label: f,
              data: values,
              borderColor: ['#3498db','#e74c3c','#2ecc71','#9b59b6','#f39c12'][idx % 5],
              fill: false,
              yAxisID: dualAxis && idx > 0 ? 'y1' : 'y'
            });
          });
          const chartBox = document.createElement('div');
          chartBox.className = 'chart-box';
          chartBox.innerHTML = `<h3>${title}</h3><canvas></canvas>`;
          chartsContainer.appendChild(chartBox);
          const ctx = chartBox.querySelector('canvas').getContext('2d');
          new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: dualAxis ? {
                y: { position: 'left' },
                y1: { position: 'right', grid: { drawOnChartArea: false } }
              } : { y: { position: 'left' } }
            }
          });
        }

        // Chart 1: Wind Speed, Max Wind Speed, Wind Chill
        buildChart("Wind Metrics", ["Wind Speed (kt)", "Max Wind Speed (kt)", "Wind Chill (C)"], true);

        // Chart 2: Precip, Relative Humidity
        buildChart("Moisture Metrics", ["Precip (in/hr)", "Relative Humidity"], true);

        // Chart 3: Temp, Dew Point, Relative Humidity, Heat Index
        buildChart("Temperature & Humidity", ["Temp (C)", "Dew Point (C)", "Relative Humidity", "Heat Index (C)"], true);

        // Chart 4: Altimeter, Elevation, Station Pressure, Pressure Alt, Density Alt
        buildChart("Pressure & Altitude", ["Altimeter (inHg)", "Elevation (ft)", "Station Pressure (inHg)", "Pressure Alt (ft)", "Density Alt (ft)"], true);

        // Chart 5: Voltage
        buildChart("Voltage", ["
