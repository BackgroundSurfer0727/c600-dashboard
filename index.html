<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBMA AWOS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<style>
body {
  font-family: Segoe UI;
  margin:0;
  background:#f4f7f6;
}

/* HEADER */
header {
  background:#2c3e50;
  color:white;
  padding:20px;
}

#topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

#title {
  font-size:1.5rem;
  font-weight:bold;
}

#icons img {
  width:26px;
  margin-right:8px;
}

.button {
  background:#27ae60;
  padding:8px 14px;
  border-radius:6px;
  color:white;
  text-decoration:none;
}

/* GRID */
.data-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
  padding:15px;
}

.card {
  background:white;
  padding:12px;
  border-radius:8px;
  text-align:center;
}

.value {
  font-size:1.3rem;
  font-weight:bold;
}

/* IMAGES */
.images {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:15px;
}

.images img {
  width:100%;
  border-radius:8px;
}

/* CHARTS */
.chart-box {
  background:white;
  margin:20px;
  padding:15px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <div id="topbar">
    <div>
      <div id="title">SBMA AWOS Live Weather (C600 Bridge)</div>
      <div id="icons" style="margin-top:8px;"></div>
    </div>

    <a class="button"
       href="https://docs.google.com/spreadsheets/d/1ZjECyZKnnqzhWvJjHq6WHpgNho2mb9Eml0gInIM5bTk/export?format=csv"
       target="_blank">
       EXPORT CSV
    </a>
  </div>
</header>

<div id="data-grid" class="data-grid"></div>

<div class="images">
  <img id="img1">
  <img id="img2">
  <img id="img3">
  <img id="img4">
</div>

<div id="charts"></div>

<script>
const sheetId = "1ZjECyZKnnqzhWvJjHq6WHpgNho2mb9Eml0gInIM5bTk";
const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

/* SAFE TIMESTAMP FORMATTER (no conversion) */
function formatUTC(raw){
  if(!raw) return "--";

  // If already formatted, return as-is
  if(typeof raw === "string") return raw;

  // fallback
  try{
    const d = new Date(raw);
    return d.toISOString().replace("T"," ").substring(0,19);
  }catch{
    return raw;
  }
}

/* WEATHER ICONS */
function setIcons(row, headers){
  const icons = document.getElementById("icons");
  icons.innerHTML = "";

  function val(name){
    const i = headers.indexOf(name);
    return i !== -1 ? parseFloat(row[i]?.v) : 0;
  }

  const heat = val("Heat Index (C)");
  const rain = val("Precip (in/hr)");
  const hum = val("Relative Humidity");
  const wind = val("Wind Speed (kt)");
  const voltage = val("Voltage");

  function add(src){
    const img = document.createElement("img");
    img.src = src;
    icons.appendChild(img);
  }

  if(heat > 30)
    add("https://cdn-icons-png.flaticon.com/512/869/869869.png");

  if(rain > 0)
    add("https://cdn-icons-png.flaticon.com/512/1163/1163624.png");

  if(hum > 80)
    add("https://cdn-icons-png.flaticon.com/512/414/414825.png");

  // Lightning logic
  if(rain > 3 && hum > 85 && wind > 10)
    add("https://cdn-icons-png.flaticon.com/512/1146/1146860.png");

  if(voltage > 5)
    add("https://cdn-icons-png.flaticon.com/512/3103/3103446.png");
}

/* WIND ROSE */
function windRose(angle){
  return `
  <svg width="80" height="80">
    <circle cx="40" cy="40" r="35" stroke="gray" fill="none"/>
    <line x1="40" y1="40"
          x2="${40 + 30*Math.cos((angle-90)*Math.PI/180)}"
          y2="${40 + 30*Math.sin((angle-90)*Math.PI/180)}"
          stroke="red" stroke-width="3"/>
    <text x="38" y="12" font-size="10">N</text>
    <text x="70" y="42" font-size="10">E</text>
    <text x="38" y="78" font-size="10">S</text>
    <text x="5" y="42" font-size="10">W</text>
  </svg>`;
}

/* FIX GOOGLE DRIVE IMAGE */
function fixDrive(url){
  if(!url) return "";
  if(url.includes("id=")){
    const id = url.split("id=")[1].split("&")[0];
    return `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
  }
  return url;
}

/* FETCH DATA */
async function load(){
  try{
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf("(")+1,text.lastIndexOf(")")));

    const rows = json.table.rows;
    const headers = json.table.cols.map(c=>c.label);
    const latest = rows[rows.length-1].c;

    // TIMESTAMP
    const tsIdx = headers.findIndex(h => h && h.toLowerCase().includes("timestamp"));
    const tsRaw = tsIdx !== -1 ? latest[tsIdx]?.v : null;
    const ts = formatUTC(tsRaw);

    document.getElementById("title").innerText =
      "SBMA AWOS Live Weather (C600 Bridge) | " + ts + " (UTC)";

    // ICONS
    setIcons(latest, headers);

    // DATA GRID
    const grid = document.getElementById("data-grid");
    grid.innerHTML = "";

    headers.forEach((h,i)=>{
      if(!h || h.includes("Image") || h.toLowerCase().includes("timestamp")) return;

      const val = latest[i]?.v ?? "--";
      const card = document.createElement("div");
      card.className = "card";

      if(h.toLowerCase().includes("wind dir")){
        card.innerHTML = `
          <div>${h}</div>
          <div class="value">${val}°</div>
          ${windRose(val)}
        `;
      } else {
        card.innerHTML = `<div>${h}</div><div class="value">${val}</div>`;
      }

      grid.appendChild(card);
    });

    // IMAGES
    ["Image_Cam1","Image_Cam2","Image_Cam3","Image_Cam4"].forEach((id,i)=>{
      const idx = headers.indexOf(id);
      if(idx !== -1){
        document.getElementById("img"+(i+1)).src = fixDrive(latest[idx]?.v);
      }
    });

  }catch(err){
    console.error("LOAD ERROR:", err);
  }
}

load();
setInterval(load, 300000);
</script>

</body>
</html>
