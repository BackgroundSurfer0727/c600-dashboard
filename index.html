<head>
  <title>Weather Dashboard</title>
  <!-- Load PapaParse first -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <!-- Your table markup here -->

  <!-- Your dashboard logic AFTER PapaParse -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRDj9jqRbu3O_s8vYnC4cE62VDO7LPPaV8oQj1I_pPNxZdH2ijDnIPY9sxSkaerSOlW50UgU5l-WeR/pub?gid=0&single=true&output=csv";

  fetch(SHEET_URL)
    .then(res => res.text())
    .then(csv => {
      Papa.parse(csv, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          const data = results.data;
          if (data.length === 0) {
            console.log("No data found in sheet.");
            return;
          }

          const headers = Object.keys(data[0]);
          const thead = document.querySelector("#dataTable thead");
          const tbody = document.querySelector("#dataTable tbody");

          // Build header row
          const headerRow = document.createElement("tr");
          headers.forEach(h => {
            const th = document.createElement("th");
            th.textContent = h;
            headerRow.appendChild(th);
          });
          thead.appendChild(headerRow);

          // Build last 20 rows
          data.slice(-20).forEach(row => {
            const tr = document.createElement("tr");
            headers.forEach(h => {
              const td = document.createElement("td");
              td.textContent = row[h] || "";
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
        }
      });
    });
});
</script>
</body>
