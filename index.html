<!DOCTYPE html>
<html>
<head>
    <title>SBMA AWOS Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #latest-image { width: 100%; max-width: 600px; border-radius: 5px; }
        .chart-box { width: 100%; max-width: 800px; height: 400px; }
    </style>
</head>
<body>
    <h1>SBMA AWOS Live (C600 Bridge)</h1>
    <div id="status">Status: Connecting...</div>

    <div class="container">
        <div class="card">
            <h3>Current Conditions</h3>
            <p>Temp: <span id="val-temp">--</span>°C</p>
            <p>Wind: <span id="val-wind">--</span> kt</p>
            <img id="latest-image" src="" onerror="this.src='https://placehold.co/600x400?text=Waiting+for+Image...'">
            <p id="timestamp">Data as of: --</p>
        </div>

        <div class="card chart-box">
            <canvas id="tempChart"></canvas>
        </div>
    </div>

    <script>
        const sheetId = "1Vov42rnv4bPrtM5U4W6H7x4JRD9oSGJR6-riOevO58U";
        const feedUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        let chart = null;

        function forceNum(cell, precision) {
            if (!cell || cell.v === null) return "--";
            let val = parseFloat(cell.v);
            return isNaN(val) ? "--" : val.toFixed(precision);
        }

        async function update() {
            try {
                const res = await fetch(feedUrl);
                const text = await res.text();
                const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
                const rows = json.table.rows;

                const COL_TS = 1, COL_WIND = 3, COL_TEMP = 4, COL_IMG = 7;
                const latest = rows[rows.length - 1].c;

                document.getElementById('val-temp').innerText = forceNum(latest[COL_TEMP], 1);
                document.getElementById('val-wind').innerText = forceNum(latest[COL_WIND], 1);
                document.getElementById('timestamp').innerText = "Last Update: " + (latest[COL_TS]?.f || "--");
                
                // Fetch the image from the latest row that HAS an image URL
                let lastImgUrl = "";
                for (let i = rows.length - 1; i >= 0; i--) {
                    if (rows[i].c[COL_IMG]?.v) {
                        lastImgUrl = rows[i].c[COL_IMG].v;
                        break;
                    }
                }
                document.getElementById('latest-image').src = lastImgUrl;

                const chartRows = rows.slice(-24);
                const labels = chartRows.map(r => r.c[COL_TS]?.f || "");
                const temps = chartRows.map(r => r.c[COL_TEMP]?.v || null);

                if (chart) chart.destroy();
                chart = new Chart(document.getElementById('tempChart'), {
                    type: 'line',
                    data: { labels, datasets: [{ label: 'Temp (°C)', data: temps, borderColor: '#3498db', fill: true }] },
                    options: { responsive: true, maintainAspectRatio: false }
                });
                document.getElementById('status').innerText = "Status: Live";
            } catch (e) { console.error(e); }
        }

        update();
        setInterval(update, 300000); 
    </script>
</body>
</html>
