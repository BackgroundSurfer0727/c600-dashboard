<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBMA AWOS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<style>
:root {
  --bg: #f4f7f6;
  --card: #ffffff;
  --text: #2c3e50;
  --accent: #3498db;
}

body.night {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
  --accent: #38bdf8;
}

body {
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  padding:20px;
  background:var(--card);
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

#topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

#title {
  font-size:1.4rem;
  font-weight:bold;
}

#icons img {
  width:28px;
  margin-right:8px;
}

.button {
  background:#27ae60;
  color:white;
  padding:8px 12px;
  border-radius:6px;
  text-decoration:none;
}

/* GRID */
.data-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
  padding:15px;
}

.card {
  background:var(--card);
  padding:12px;
  border-radius:8px;
  text-align:center;
}

.value {
  font-size:1.3rem;
  font-weight:bold;
}

/* STATUS PANEL */
#status-panel {
  display:flex;
  gap:10px;
  padding:10px;
}

.status-box {
  flex:1;
  background:var(--card);
  padding:10px;
  border-radius:8px;
  font-size:0.9rem;
}

/* IMAGES */
.images {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:15px;
}

.images img {
  width:100%;
  border-radius:8px;
}

/* MOBILE MODE */
body.mobile .images {
  grid-template-columns:1fr;
}
</style>
</head>

<body>

<header>
  <div id="topbar">
    <div>
      <div id="title">SBMA AWOS Live Weather</div>
      <div id="icons"></div>
    </div>

    <a class="button"
       href="https://docs.google.com/spreadsheets/d/1ZjECyZKnnqzhWvJjHq6WHpgNho2mb9Eml0gInIM5bTk/export?format=csv"
       target="_blank">
       EXPORT CSV
    </a>
  </div>
</header>

<div id="status-panel">
  <div class="status-box" id="status-conn">Connection: --</div>
  <div class="status-box" id="status-voltage">Voltage: --</div>
  <div class="status-box" id="status-age">Data Age: --</div>
</div>

<div id="data-grid" class="data-grid"></div>

<div class="images">
  <img id="img1">
  <img id="img2">
  <img id="img3">
  <img id="img4">
</div>

<script>
const sheetId = "1ZjECyZKnnqzhWvJjHq6WHpgNho2mb9Eml0gInIM5bTk";
const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

// ===== TIME =====
function toManila(utc) {
  if (!utc) return null;

  let d;

  // Try direct parse first
  d = new Date(utc);

  // If invalid, try manual parsing
  if (isNaN(d)) {
    try {
      // Try splitting manually (handles "YYYY-MM-DD HH:MM:SS")
      const parts = utc.split(/[- :/]/);

      if (parts.length >= 5) {
        let year, month, day, hour, min, sec;

        // Detect format
        if (parts[0].length === 4) {
          // YYYY-MM-DD
          [year, month, day, hour, min, sec] = parts;
        } else {
          // DD/MM/YYYY or MM/DD/YYYY fallback
          [day, month, year, hour, min, sec] = parts;
        }

        d = new Date(year, month - 1, day, hour || 0, min || 0, sec || 0);
      }
    } catch (e) {
      console.error("Date parse failed:", utc);
      return null;
    }
  }

  if (isNaN(d)) return null;

  // Add Manila offset
  return new Date(d.getTime() + 8 * 3600000);
}

function format(d) {
  if (!d || isNaN(d)) return "--";

  const pad = n => String(n).padStart(2, '0');

  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ` +
         `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// ===== DAY NIGHT =====
function applyTheme(date){
  const h = date.getHours();
  if(h >= 18 || h <= 5){
    document.body.classList.add("night");
  }
}

// ===== MOBILE DETECT =====
if(window.innerWidth < 768){
  document.body.classList.add("mobile");
}

// ===== ICONS =====
function setIcons(data, headers){
  const iconsDiv = document.getElementById("icons");
  iconsDiv.innerHTML = "";

  function val(name){
    const i = headers.indexOf(name);
    return i!==-1 ? parseFloat(data[i]?.v) : 0;
  }

  const heat = val("Heat Index (C)");
  const rain = val("Precip (in/hr)");
  const hum = val("Relative Humidity");
  const wind = val("Wind Speed (kt)");

  function icon(src){
    const img = document.createElement("img");
    img.src = src;
    iconsDiv.appendChild(img);
  }

  if(heat > 30) icon("https://cdn-icons-png.flaticon.com/512/869/869869.png");
  if(rain > 0) icon("https://cdn-icons-png.flaticon.com/512/1163/1163624.png");
  if(hum > 80) icon("https://cdn-icons-png.flaticon.com/512/414/414825.png");

  // lightning logic
  if(rain > 3 && hum > 85 && wind > 10){
    icon("https://cdn-icons-png.flaticon.com/512/1146/1146860.png");
  }

  const voltage = val("Voltage");
  if(voltage > 5){
    icon("https://cdn-icons-png.flaticon.com/512/3103/3103446.png");
  }
}

// ===== WIND ROSE =====
function windRose(angle){
  return `
  <svg width="80" height="80">
    <circle cx="40" cy="40" r="35" stroke="gray" fill="none"/>
    <line x1="40" y1="40"
          x2="${40 + 30*Math.cos((angle-90)*Math.PI/180)}"
          y2="${40 + 30*Math.sin((angle-90)*Math.PI/180)}"
          stroke="red" stroke-width="3"/>
  </svg>`;
}

// ===== FETCH =====
async function load(){
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf("(")+1,text.lastIndexOf(")")));

  const rows = json.table.rows;
  const headers = json.table.cols.map(c=>c.label);
  const latest = rows[rows.length-1].c;

  const tsRaw = latest[headers.indexOf("Timestamp (UTC)")]?.v;
  const ts = toManila(tsRaw);

  document.getElementById("title").innerText =
    "SBMA AWOS Live Weather (C600 Bridge) | " + format(ts);

  applyTheme(ts);
  setIcons(latest, headers);

  // STATUS PANEL
  const voltage = latest[headers.indexOf("Voltage")]?.v;
  document.getElementById("status-voltage").innerText = "Voltage: " + voltage;

  const ageMin = (Date.now() - ts.getTime())/60000;
  document.getElementById("status-age").innerText = "Data Age: " + ageMin.toFixed(1)+" min";

  document.getElementById("status-conn").innerText =
    ageMin < 10 ? "Connection: OK" : "Connection: DELAY";

  // DATA GRID
  const grid = document.getElementById("data-grid");
  grid.innerHTML = "";

  headers.forEach((h,i)=>{
    if(!h || h.includes("Image") || h.includes("Timestamp")) return;

    const val = latest[i]?.v ?? "--";
    const div = document.createElement("div");
    div.className = "card";

    if(h.toLowerCase().includes("wind dir")){
      div.innerHTML = `<div>${h}</div>
        <div class="value">${val}°</div>
        ${windRose(val)}`;
    } else {
      div.innerHTML = `<div>${h}</div><div class="value">${val}</div>`;
    }

    grid.appendChild(div);
  });

  // IMAGES
  ["Image_Cam1","Image_Cam2","Image_Cam3","Image_Cam4"].forEach((id,i)=>{
    const idx = headers.indexOf(id);
    if(idx!==-1){
      document.getElementById("img"+(i+1)).src = latest[idx]?.v;
    }
  });
}

load();
setInterval(load,300000);
</script>

</body>
</html>
