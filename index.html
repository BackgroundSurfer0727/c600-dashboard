<head>
  <title>Weather Dashboard</title>
  <!-- Load PapaParse first -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <!-- Your table markup here -->

  <!-- Your dashboard logic AFTER PapaParse -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRDj9jqRbu3O_s8vYnC4cE62VDO7LPPaV8oQj1I_pPNxZdH2ijDnIPY9sxSkaerSOlW50UgU5l-WeR/pub?gid=0&single=true&output=csv";

      fetch(SHEET_URL)
        .then(res => res.text())
        .then(csv => {
          Papa.parse(csv, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
              const data = results.data;
              const tbody = document.querySelector("#dataTable tbody");

              data.slice(-20).forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                  <td>${row.timestamp || ""}</td>
                  <td>${row.wind_dir || ""}</td>
                  <td>${row.wind_speed || ""}</td>
                  <td>${row.temp || ""}</td>
                  <td>${row.humidity || ""}</td>
                  <td>${row.pressure || ""}</td>
                  <td>${row.lat || ""}</td>
                  <td>${row.lon || ""}</td>
                `;
                tbody.appendChild(tr);
              });
            }
          });
        });
    });
  </script>
</body>
